<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Luxury Botanical Apothecary</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background-color: #f0f5f0;
      border-radius: 10px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .login-container h1 {
      text-align: center;
      color: #3a503a;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #3a503a;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d4e3d4;
      border-radius: 5px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #6a8a6a;
      box-shadow: 0 0 5px rgba(106, 138, 106, 0.3);
    }

    .login-btn {
      background-color: #6a8a6a;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .login-btn:hover {
      background-color: #527352;
      transform: translateY(-3px);
    }

    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #4b4b3f;
    }

    .signup-link a {
      color: #6a8a6a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .signup-link a:hover {
      color: #527352;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 1rem;
    }

    .forgot-password a {
      color: #6a8a6a;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .forgot-password a:hover {
      color: #527352;
    }
  </style>
</head>

<body>

  <header id="header">
    <div class="logo">Luxury Botanical</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Login</a>
      <a href="intake.html">Intake Form</a>
      <a href="index.html#herbs">Herbs</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <div class="login-container">
    <h1>Login</h1>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="forgot-password">
        <a href="#forgot">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="#signup">Create one here</a>
    </div>
  </div>

  <script src="auth.js"></script>
</body>

</html>
