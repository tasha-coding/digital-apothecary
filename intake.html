<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symptom Intake</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body>
<header><h1>Symptom Intake</h1></header>

<div class="card">
  <h2>How are you feeling?</h2>

  <label><input type="checkbox" value="stress"> Stress</label><br>
  <label><input type="checkbox" value="tired"> Fatigue</label><br>
  <label><input type="checkbox" value="digestive"> Digestive Issues</label><br>
  <label><input type="checkbox" value="anxiety"> Anxiety</label><br>
  <label><input type="checkbox" value="immune"> Immune Support</label><br>

  <button class="btn" id="submitIntake">Submit</button>
</div>

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="intake.js"></script>
</body>
</html>
