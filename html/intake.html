<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprehensive Intake</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<header><h1>Comprehensive Health Intake</h1></header>


<section class="container">
  <div class="card">
    <h2>Select Current Symptoms</h2>

    <label><input type="checkbox" value="stress"> Stress</label><br>
    <label><input type="checkbox" value="tired"> Low energy / tiredness</label><br>
    <label><input type="checkbox" value="anxiety"> Anxiety</label><br>
    <label><input type="checkbox" value="digestive"> Digestive discomfort</label><br>
    <label><input type="checkbox" value="immune"> Immune support</label><br><br>


    <button class="btn" id="submitIntake">Submit Intake</button>
  </div>
</section>

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="intake.js"></script>
</body>
</html>
