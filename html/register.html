<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <header id="header">
        <div class="logo">Luxury Botanical</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Login</a>
            <a href="intake.html">Intake Form</a>
            <a href="#herbs">Herbs</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="container auth-layout">
        <div class="card auth-card">
            <h2>Create Account</h2>
            <input id="registerName" type="text" placeholder="Full Name">
            <input id="registerEmail" type="email" placeholder="Email">
            <input id="registerPassword" type="password" placeholder="Password">
            <select id="registerRole">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <button class="btn" id="registerBtn" type="button">Register</button>
        </div>
        
        <div class="card auth-card">
            <h2>Login</h2>
            <input id="loginEmail" type="email" placeholder="Email">
            <input id="loginPassword" type="password" placeholder="Password">
            <button class="btn" id="loginBtn" type="button">Login</button>
        </div>
    </section>

    <section class="container">
        <p id="authMessage" class="status-message" aria-live="polite"></p>
    </section>

    <script src="firebase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
